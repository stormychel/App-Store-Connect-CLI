name: Release CLI

on:
  push:
    tags:
      - 'asc/v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate release tag
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^asc/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match asc/vX.Y.Z. Got: ${TAG}"
            exit 1
          fi

          VERSION_TAG="${TAG#asc/}"
          VERSION="${VERSION_TAG#v}"

          printf 'VERSION_TAG=%s\n' "$VERSION_TAG" >> "$GITHUB_ENV"
          printf 'VERSION=%s\n' "$VERSION" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Install tooling
        run: make tools

      - name: Self-test docs validators
        run: python3 scripts/test_check_docs.py

      - name: Check release docs updated
        run: make check-release-docs VERSION="${VERSION}"

      - name: Run release guardrails
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make format-check
          make check-docs
          make check-wall-of-apps
          make lint
          ASC_BYPASS_KEYCHAIN=1 make test

      - name: Create release directory
        run: mkdir -p release

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}

      - name: Build for macOS
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_macOS_amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_macOS_arm64 .

      - name: Code sign macOS binaries
        if: env.APPLE_DEVELOPER_ID != ''
        run: |
          for binary in release/asc_*_macOS_*; do
            codesign --force --sign "${{ secrets.APPLE_DEVELOPER_ID }}" --timestamp --options=runtime "$binary"
          done
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}

      - name: Build for Linux
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_linux_arm64 .

      - name: Build for Windows
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" -o release/asc_${VERSION}_windows_amd64.exe .

      - name: Create checksums
        run: |
          cd release
          shasum -a 256 * > asc_${VERSION}_checksums.txt

      - name: Display files
        run: ls -la release/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --verify-tag
          fi

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "::error::TAP_GITHUB_TOKEN not set"
            exit 1
          fi

          export SHA256_AMD64=$(shasum -a 256 release/asc_${VERSION}_macOS_amd64 | cut -d ' ' -f 1)
          export SHA256=$(shasum -a 256 release/asc_${VERSION}_macOS_arm64 | cut -d ' ' -f 1)

          # Clone the tap repo
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/rudrankriyam/homebrew-tap.git homebrew-tap
          cd homebrew-tap

          # Update the formula
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          version = os.environ["VERSION"]
          sha256_arm64 = os.environ["SHA256"]
          sha256_amd64 = os.environ["SHA256_AMD64"]
          formula = dedent(
              f"""\
              # typed: false
              # frozen_string_literal: true

              class Asc < Formula
                desc "A fast, AI-agent friendly CLI for App Store Connect"
                homepage 'https://github.com/rudrankriyam/App-Store-Connect-CLI'
                version '{version}'
                license 'MIT'

                depends_on :macos

                on_macos do
                  if Hardware::CPU.arm?
                    url 'https://github.com/rudrankriyam/App-Store-Connect-CLI/releases/download/asc%2Fv{version}/asc_{version}_macOS_arm64'
                    sha256 '{sha256_arm64}'
                  else
                    url 'https://github.com/rudrankriyam/App-Store-Connect-CLI/releases/download/asc%2Fv{version}/asc_{version}_macOS_amd64'
                    sha256 '{sha256_amd64}'
                  end
                end

                def install
                  if Hardware::CPU.arm?
                    bin.install 'asc_{version}_macOS_arm64' => 'asc'
                  else
                    bin.install 'asc_{version}_macOS_amd64' => 'asc'
                  end
                end

                test do
                  assert_match "asc is a fast, lightweight cli", shell_output("#{{bin}}/asc --help")
                end
              end
              """
          )
          Path("Formula/asc.rb").write_text(formula, encoding="utf-8")
          PY

          # Commit and push
          git config user.name "Rudrank Riyam"
          git config user.email "rudrankriyam@gmail.com"
          git add Formula/asc.rb
          git commit -m "Update asc to ${VERSION}" || echo "No changes to commit"
          git push
