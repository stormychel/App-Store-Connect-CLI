# Updates docs/badges/installs-total.json for the README Shields endpoint badge.
name: Refresh installs badge

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: refresh-installs-badge
  cancel-in-progress: true

jobs:
  update:
    if: github.repository == 'rudrankriyam/App-Store-Connect-CLI'
    runs-on: ubuntu-latest
    steps:
      # release.* checks out the tag by default; we must commit on main.
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Self-test badge formatter
        run: python3 scripts/test_download_stats_total.py

      - name: Regenerate badge JSON
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/download_stats_total.py --write-badge docs/badges/installs-total.json

      - name: Create or update badge refresh PR
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: docs/badges/installs-total.json
          base: main
          branch: automation/refresh-installs-badge
          commit-message: "chore: refresh estimated downloads badge"
          delete-branch: true
          title: "chore: refresh estimated downloads badge"
          body: |
            Automated refresh for `docs/badges/installs-total.json`.

            This PR is created by the `refresh-installs-badge` workflow because
            `main` is protected and badge updates must go through the normal PR checks.

      - name: Dispatch PR checks for bot branch
        if: steps.create_pr.outputs.pull-request-operation != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BRANCH: ${{ steps.create_pr.outputs.pull-request-branch }}
        run: |
          curl --fail-with-body --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/pr-checks.yml/dispatches" \
            --data "{\"ref\":\"${PR_BRANCH}\"}"
